include:
  - project: infra/ci-templates
    ref: v1.15.1
    file: /gitlab-ci.yml

variables:
  APP_NAME: helloworld
  # Monorepo multi-services (cf. AGENTS.md) : liste "<service>=<image>"
  # espacée, un sous-dossier + un Dockerfile par service. SERVICE_NAME reste
  # le service vitrine pour l'URL des environnements GitLab CI.
  SERVICES: "helloworld-svc=ghcr.io/poc-devops-elkouhen/helloworld-svc helloworld-gui=ghcr.io/poc-devops-elkouhen/helloworld-gui"
  SERVICE_NAME: helloworld-gui
  INTERNAL_GITLAB_HOST: gitlab-webservice-default.gitlab.svc.cluster.local:8181
  MANIFESTS_PROJECT_PATH: infra/helloworld-iac
  MANIFESTS_PATH: k8s
  HAS_PREPROD: "true"
